<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenant Setup</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #0056b3;
        }

        .message {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Tenant Setup</h2>
        <form id="setupForm">
            <div class="form-group">
                <label for="companyName">Company Name *</label>
                <input type="text" id="companyName" name="companyName" required>
            </div>
            <div class="form-group">
                <label for="title">Official Title</label>
                <input type="text" id="title" name="title">
            </div>
            <div class="form-group">
                <label for="siteUrl">Web Site (URL)</label>
                <input type="url" id="siteUrl" name="siteUrl">
            </div>
            <div class="form-group">
                <label for="email">E-mail Address</label>
                <input type="email" id="email" name="email">
            </div>
            <div class="form-group">
                <label for="phone">Phone Customer Service</label>
                <input type="text" id="phone" name="phone">
            </div>
            <div class="form-group">
                <label for="taxOffice">Tax Office</label>
                <input type="text" id="taxOffice" name="taxOffice">
            </div>
            <div class="form-group">
                <label for="taxNo">Tax Number</label>
                <input type="text" id="taxNo" name="taxNo">
            </div>
            <button type="submit" class="btn" id="submitBtn">Complete Setup</button>
        </form>
        <div id="statusMessage" class="message"></div>
    </div>

    <script src="script.js"></script>

</body>

</html>
